<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.A.P - Manutenção Ativa Preventiva</title>

    <link rel="stylesheet" href="../../assets/css/manutencao.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root,
        [data-theme="light"] {
            --mod-header-bg:    #2c3e50;
            --mod-nav-bg:       #dfe6e9;
            --mod-nav-btn-bg:   #ffffff;
            --mod-nav-btn-text: #2c3e50;
            --mod-nav-border:   #bdc3c7;
            --mod-card-bg:      #ffffff;
            --mod-label:        #34495e;
            --mod-input-border: #cccccc;
            --mod-accent:       #0664d7;
            --mod-accent-dark:  #004080;
            --mod-accent-border:#3498db;
        }

        [data-theme="dark"] {
            --mod-header-bg:    #1e293b;
            --mod-nav-bg:       #1a2535;
            --mod-nav-btn-bg:   #263248;
            --mod-nav-btn-text: #e2e8f0;
            --mod-nav-border:   #334155;
            --mod-card-bg:      #1e293b;
            --mod-label:        #94a3b8;
            --mod-input-border: #334155;
            --mod-accent:       #3b82f6;
            --mod-accent-dark:  #2563eb;
            --mod-accent-border:#3b82f6;
        }

        :root { --header-height: 100px; }

        body { padding: 0; }

        .header-modulo {
            background-color: var(--mod-header-bg);
            color: white;
            padding: 0 5%;
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--mod-accent-border);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
            transition: background 0.3s;
        }

        .header-modulo small { opacity: 0.75; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; }
        .header-modulo h2   { margin: 0; font-size: 1.8rem; color: #fff; }

        .header-actions { display: flex; align-items: center; gap: 10px; }

        .btn-voltar {
            background: var(--mod-accent-border);
            border: none; color: white; padding: 12px 25px;
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-voltar:hover { filter: brightness(0.88); transform: scale(1.04); }

        .theme-toggle-wrap { display: flex; align-items: center; gap: 6px; }
        .theme-icon { font-size: 1rem; color: rgba(255,255,255,0.8); }
        .theme-toggle {
            position: relative; width: 44px; height: 24px;
            background: #334155; border-radius: 12px; border: none;
            cursor: pointer; transition: background 0.3s; flex-shrink: 0;
        }
        .theme-toggle::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 18px; height: 18px; background: #fff;
            border-radius: 50%; transition: transform 0.3s;
        }
        [data-theme="light"] .theme-toggle { background: var(--mod-accent-border); }
        [data-theme="light"] .theme-toggle::after { transform: translateX(20px); }

        .nav-modulo {
            position: fixed; top: var(--header-height); width: 100%;
            background: var(--mod-nav-bg); padding: 12px 0;
            display: flex; justify-content: center; gap: 16px;
            z-index: 999; box-shadow: 0 2px 5px rgba(0,0,0,0.12);
            transition: background 0.3s;
        }

        .nav-modulo button {
            padding: 10px 22px; border: 1px solid var(--mod-nav-border);
            background: var(--mod-nav-btn-bg); border-radius: 6px;
            cursor: pointer; font-weight: bold; color: var(--mod-nav-btn-text);
            width: auto; transition: 0.3s;
        }
        .nav-modulo button:hover { background: var(--mod-accent); color: white; border-color: var(--mod-accent); }

        .app-container { max-width: 950px; margin: 190px auto 50px; padding: 20px; }

        .card-app {
            background: var(--mod-card-bg); border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.10); padding: 30px;
            margin-bottom: 40px; border-top: 6px solid var(--mod-accent);
            transition: background 0.3s;
        }
        [data-theme="dark"] .card-app { box-shadow: 0 4px 15px rgba(0,0,0,0.35); }

        .card-app h2 { color: var(--mod-accent); border-bottom: 2px solid var(--mod-input-border); padding-bottom: 10px; margin-top: 0; }
        .card-app h3 { color: var(--mod-accent); margin-top: 40px; }

        .app-form { display: grid; gap: 15px; }
        .app-form label { font-weight: bold; color: var(--mod-label); font-size: 0.9rem; }
        .app-form input, .app-form select, .app-form textarea {
            width: 100%; padding: 12px; border: 1px solid var(--mod-input-border);
            border-radius: 6px; box-sizing: border-box; font-size: 1rem;
            background: var(--bg-input, #fff); color: var(--text-primary, #2c3e50);
            font-family: inherit; transition: border-color 0.2s, background 0.3s; margin: 0;
        }
        .app-form input:focus, .app-form select:focus, .app-form textarea:focus {
            outline: none; border-color: var(--mod-accent);
            box-shadow: 0 0 0 3px rgba(52,152,219,0.18);
        }
        .app-form input::placeholder, .app-form textarea::placeholder { color: var(--mod-label); opacity: 0.6; }

        .btn-app {
            background: var(--mod-accent); color: white; padding: 15px; border: none;
            border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase;
            width: 100%; font-family: inherit; transition: background 0.2s;
        }
        .btn-app:hover { background: var(--mod-accent-dark); filter: none; }

        .btn-outline-app {
            background: transparent; border: 2px solid var(--mod-accent);
            color: var(--mod-accent); margin-top: 10px;
        }
        .btn-outline-app:hover { background: var(--mod-accent); color: white; }

        .busca-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .busca-row input {
            flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--mod-input-border);
            background: var(--bg-input, #fff); color: var(--text-primary, #2c3e50);
            font-family: inherit; margin: 0; transition: background 0.3s;
        }
        .busca-row .btn-app { width: auto; padding: 12px 24px; }

        .badge-alerta {
            display: inline-block; background: #fff3cd; color: #856404;
            border: 1px solid #ffc107; border-radius: 20px; padding: 3px 12px;
            font-size: 0.78rem; font-weight: bold; margin-left: 8px; vertical-align: middle;
        }
        .badge-ok {
            display: inline-block; background: #d1e7dd; color: #0a3622;
            border: 1px solid #a3cfbb; border-radius: 20px; padding: 3px 12px;
            font-size: 0.78rem; font-weight: bold; margin-left: 8px; vertical-align: middle;
        }
        [data-theme="dark"] .badge-alerta { background: rgba(255,193,7,0.15); color: #ffc107; border-color: rgba(255,193,7,0.3); }
        [data-theme="dark"] .badge-ok     { background: rgba(25,135,84,0.15);  color: #4ade80; border-color: rgba(25,135,84,0.3); }

        .maq-card { padding: 15px; margin-top: 10px; border-radius: 6px; transition: background 0.3s; }
        .maq-card.alerta { border-left: 5px solid #ffc107; background: #fffbf0; }
        .maq-card.ok     { border-left: 5px solid #198754; background: #f8f9fa; }
        [data-theme="dark"] .maq-card.alerta { background: rgba(255,193,7,0.08); }
        [data-theme="dark"] .maq-card.ok     { background: rgba(25,135,84,0.08); }

        /* Aviso de lista vazia no select de OS */
        .select-vazio-aviso {
            font-size: 0.82rem;
            color: #e74c3c;
            margin-top: 4px;
            display: none;
        }

        #dadosmaquina, #ordem_servico { text-align: center; margin-top: 10px; color: var(--mod-accent); font-size: 0.92rem; }

        footer { margin-top: 0; }
    </style>
</head>
<body>

    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); })();</script>

    <header class="header-modulo">
        <div>
            <small>Módulo de Manutenção</small>
            <h2>⚙️ Manutenção Preventiva</h2>
        </div>
        <div class="header-actions">
            <div class="theme-toggle-wrap">
                <span class="theme-icon" id="themeIcon">🌙</span>
                <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema"></button>
            </div>
            <button class="btn-voltar" onclick="window.location.href='../../app.html'">← Voltar ao Menu</button>
        </div>
    </header>

    <nav class="nav-modulo">
        <button onclick="trocarTela('cadastro')">📥 Gestão de Máquinas</button>
        <button onclick="trocarTela('estoque')">📊 Ordens de Serviço</button>
    </nav>

    <main class="app-container">

        <section class="card-app">
            <h2>Gestão de Máquinas</h2>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                <button onclick="exportarExcel()" class="btn-app" style="background-color: #27ae60; flex: 1;">📥 Exportar Excel</button>
                <button onclick="exportarPDF()" class="btn-app" style="background-color: #c0392b; flex: 1;">📄 Exportar PDF</button>
                <button onclick="document.getElementById('fileImport').click()" class="btn-app" style="background-color: #f39c12; flex: 1;">📤 Importar Excel</button>
                
                <input type="file" id="fileImport" accept=".xlsx, .xls" style="display: none;" onchange="importarExcel(event)">
            </div>
            
            <form id="cadastroMaquinas" class="app-form">
                <div><label>Nome da Máquina:</label><input type="text" id="nomeMaquina" placeholder="Ex: Torno CNC" required /></div>
                <div><label>Modelo:</label><input type="text" id="modelo" placeholder="Ex: G-200" required /></div>
                <div><label>Número de Série:</label><input type="text" id="numeroSerie" placeholder="Ex: SN-12345" required /></div>
                <div><label>Data da Última Manutenção:</label><input type="date" id="dataUltimaManutencao" required /></div>
                <button type="submit" class="btn-app">Cadastrar Equipamento</button>
            </form>
            <p id="dadosmaquina"></p>

            <h3>Consultar Inventário</h3>
            <div class="busca-row">
                <input type="text" id="buscaNomeMaquinas" placeholder="Filtrar por nome...">
                <button id="btnBuscarMaquinas" class="btn-app">Filtrar</button>
            </div>
            <button id="btnConsultarMaquinas" class="btn-app btn-outline-app">Exibir Tudo</button>
            <div id="listaMaquina"></div>
        </section>

        <section class="card-app">
            <h2>Ordens de Serviço</h2>
            <form id="ordemServico" class="app-form">
                <div>
                    <label>Máquina Identificada:</label>
                    <select id="maquinaOS" required>
                        <option value="">-- Nenhuma máquina cadastrada --</option>
                    </select>
                    <small class="select-vazio-aviso" id="avisoMaquinaOS">
                        ⚠️ Cadastre ao menos uma máquina antes de abrir uma Ordem de Serviço.
                    </small>
                </div>
                <div><label>Descrição do Problema/Serviço:</label><textarea id="descricaoOS" rows="3" required></textarea></div>
                <div>
                    <label>Status Atual:</label>
                    <select id="statusOS" required>
                        <option value="pendente">Pendente</option>
                        <option value="em andamento">Em andamento</option>
                        <option value="concluido">Concluído</option>
                    </select>
                </div>
                <button type="submit" class="btn-app">Abrir Ordem de Serviço</button>
            </form>
            <p id="ordem_servico"></p>

            <h3>Histórico de Intervenções</h3>
            <button id="btnConsultarOS" class="btn-app btn-outline-app">Atualizar Histórico</button>
            <div id="listaOS"></div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 M.A.P - Manutenção Ativa Preventiva</p>
    </footer>

    <script src="../../assets/js/manutencao.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn  = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const aplicar = (t) => {
                document.documentElement.setAttribute('data-theme', t);
                localStorage.setItem('theme', t);
                if (icon) icon.textContent = t === 'dark' ? '🌙' : '☀️';
            };
            aplicar(localStorage.getItem('theme') || 'dark');
            if (btn) btn.addEventListener('click', () =>
                aplicar(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')
            );
        });
    </script>
    <script src="../../assets/js/acessibilidade.js"></script>

</body>
</html>
