<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <base href="../../">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LogiStock ERP</title>
    <script src="public/assets/js/theme.js"></script>
    <link rel="stylesheet" href="public/assets/css/layout.css">
    <link rel="stylesheet" href="public/assets/css/login.css">
</head>
<body>

    <div id="header"></div>

    <div class="container">
        <div class="login-wrapper">

            <!-- CADASTRO -->
            <div class="login-card">
                <h2><span>📋</span> Criar Conta</h2>

                <div class="form-group">
                    <label for="cadEmail">E-mail</label>
                    <input type="email" id="cadEmail" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="cadSenha">Senha</label>
                    <input type="password" id="cadSenha" placeholder="Mínimo 6 caracteres">
                </div>
                <button class="btn-submit outline" onclick="cadastrar()">Cadastrar</button>
            </div>

            <!-- LOGIN -->
            <div class="login-card">
                <h2><span>🔐</span> Acessar Sistema</h2>

                <div class="form-group">
                    <label for="loginEmail">E-mail</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="loginSenha">Senha</label>
                    <input type="password" id="loginSenha" placeholder="Digite sua senha">
                </div>
                <button class="btn-submit" onclick="fazerLogin()">Entrar</button>
                <p id="mensagem"></p>
            </div>

        </div>
    </div>

    <div id="footer"></div>

    <script src="public/assets/js/component.js"></script>
    <script src="public/assets/js/login.js"></script>
    <script defer src="public/assets/js/vlibras.js"></script>
</body>
</html>
